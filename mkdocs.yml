site_name: AI Edge Gallery Docs
site_description: Documentation site generated from the repository docs directory
docs_dir: docs
use_directory_urls: false
theme:
  name: material
markdown_extensions:
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
